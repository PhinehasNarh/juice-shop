name: DevSecOps Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ──────────────────────────────────────────────
  # JOB 1: Static Application Security Testing
  # Tool: Semgrep
  # ──────────────────────────────────────────────
  sast:
    name: SAST - Semgrep
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep SAST scan
        run: |
          semgrep ci \
            --config=p/security-audit \
            --config=p/javascript \
            --config=p/nodejs \
            --config=p/owasp-top-ten \
            --sarif \
            --output=semgrep.sarif \
            --no-rewrite-rule-ids \
            2>&1 | tee semgrep-output.txt || true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      - name: Upload Semgrep report artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-report
          path: |
            semgrep.sarif
            semgrep-output.txt

  # ──────────────────────────────────────────────
  # JOB 2: Dependency & Container Vulnerability Scan
  # Tool: Trivy
  # ──────────────────────────────────────────────
  dependency-scan:
    name: Dependency Scan - Trivy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy filesystem scan (table output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Run Trivy filesystem scan (SARIF output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Upload Trivy SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Build Docker image for container scan
        run: docker build -t juice-shop:${{ github.sha }} .

      - name: Run Trivy container image scan (table output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: juice-shop:${{ github.sha }}
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Run Trivy container image scan (SARIF output)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: image
          image-ref: juice-shop:${{ github.sha }}
          format: sarif
          output: trivy-image.sarif
          exit-code: '0'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Upload Trivy image SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Upload Trivy reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-reports
          path: |
            trivy-fs.sarif
            trivy-image.sarif

  # ──────────────────────────────────────────────
  # JOB 3: Dynamic Application Security Testing
  # Tool: OWASP ZAP Baseline Scan
  # ──────────────────────────────────────────────
  dast:
    name: DAST - OWASP ZAP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull and start Juice Shop container
        run: |
          docker pull bkimminich/juice-shop
          docker run -d \
            --name juice-shop \
            -p 3000:3000 \
            bkimminich/juice-shop

      - name: Wait for Juice Shop to be ready
        run: |
          echo "Waiting for Juice Shop to start..."
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:3000 | grep -q "200"; then
              echo "Juice Shop is up!"
              break
            fi
            echo "Attempt $i: not ready yet, waiting 5s..."
            sleep 5
          done

      - name: ZAP Baseline Scan
        run: |
          docker run --network=host \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t http://localhost:3000 \
            -r /zap/wrk/zap-report.html \
            -J /zap/wrk/zap-report.json \
            -w /zap/wrk/zap-report.md \
            -c /zap/wrk/.zap/rules.tsv \
            -a -j || true

      - name: List ZAP output files
        if: always()
        run: |
          echo "=== Workspace root ==="
          ls -la ${{ github.workspace }}/
          echo "=== ZAP files ==="
          find ${{ github.workspace }} -name "zap-report*" -o -name "report_*" 2>/dev/null || echo "none found"

      - name: Upload ZAP report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report
          path: |
            zap-report.html
            zap-report.json
            zap-report.md

  # ──────────────────────────────────────────────
  # JOB 4: Pipeline Summary
  # Collects all scan results into one summary
  # ──────────────────────────────────────────────
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [sast, dependency-scan, dast]
    if: always()
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Print summary
        run: |
          echo "## DevSecOps Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| SAST (Semgrep) | ${{ needs.sast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dependency Scan (Trivy) | ${{ needs.dependency-scan.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| DAST (OWASP ZAP) | ${{ needs.dast.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full reports available as workflow artifacts." >> $GITHUB_STEP_SUMMARY
